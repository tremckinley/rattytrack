<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyTrackAI - Civic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- DESIGN SYSTEM: CIVIC BRUTALISM --- */
        
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --color-rose-950: #4c0519;
            --color-rose-900: #881337;
            --color-rose-700: #be123c;
            --color-stone-950: #0c0a09;
            --color-stone-50: #fafaf9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-stone-50);
            color: var(--color-stone-950);
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Brutalist Shadows & Borders */
        .brutal-border {
            border: 2px solid var(--color-stone-950);
        }

        .brutal-shadow {
            box-shadow: 4px 4px 0px 0px var(--color-stone-950);
        }

        .brutal-shadow-hover:hover {
            box-shadow: 6px 6px 0px 0px var(--color-stone-950);
            transform: translate(-2px, -2px);
        }

        .brutal-shadow-rose {
            box-shadow: 4px 4px 0px 0px var(--color-rose-900);
        }

        /* Interactive Elements */
        .btn-primary {
            background-color: var(--color-stone-950);
            color: white;
            padding: 0.5rem 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 2px solid var(--color-stone-950);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: var(--color-rose-900);
            border-color: var(--color-stone-950);
            box-shadow: 4px 4px 0px 0px var(--color-stone-950);
        }

        .btn-secondary {
            background-color: white;
            color: var(--color-stone-950);
            padding: 0.5rem 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--color-stone-950);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background-color: var(--color-stone-50);
            box-shadow: 4px 4px 0px 0px var(--color-stone-950);
        }

        /* Utility */
        .redacted {
            background-color: black;
            color: black;
            width: fit-content;
        }
        
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #e7e5e4;
            border-left: 2px solid #0c0a09;
        }
        ::-webkit-scrollbar-thumb {
            background: #0c0a09;
            border: 2px solid #e7e5e4;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #881337;
        }

        /* Pattern Background for Hero */
        .bg-pattern {
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

                <a href="#" class="hover:text-white">Privacy</a>
                <a href="#" class="hover:text-white">Contact</a>

        </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>

        const state = {

                { id: 1, name: "Elena Rodriguez", role: "District 4", attendance: 92, image: "ER" },
                { id: 2, name: "Marcus Chen", role: "District 2", attendance: 85, image: "MC" },
                { id: 3, name: "Sarah Jenkins", role: "District 7", attendance: 98, image: "SJ" }

        // --- COMPONENT RENDERERS ---

        function renderDashboard() {
            return `
                <!-- HERO & SEARCH (Anthony's Tool) -->
                <section class="bg-stone-950 text-white p-8 md:p-12 brutal-border brutal-shadow-rose relative overflow-hidden">
                    <div class="absolute inset-0 bg-pattern opacity-10"></div>
                    <div class="relative z-10">
                        <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tight mb-2">Civic Intelligence</h1>
                        <p class="font-mono text-stone-400 mb-8 max-w-xl">
                            // Search across 4 municipalities. <br>
                            // 124 hours of footage indexed this week.
                        </p>
                        <div class="flex flex-col md:flex-row gap-0 w-full max-w-2xl brutal-shadow">
                            <div class="bg-stone-800 text-stone-400 px-4 py-3 border-2 border-stone-950 border-b-0 md:border-b-2 md:border-r-0 flex items-center font-mono text-sm">

                                                    "${alert.keyword}" detected

                                                <div class="font-mono text-xs text-stone-500 mt-1">

                                                </div>
                                            </div>
                                        </div>
                                        <div class="font-mono text-xs font-bold text-stone-400">
                                            ${alert.time} ->

                        <!-- Trend Analysis (Anthony's Tool) -->
                        <section>
                            <h2 class="text-xl font-black uppercase tracking-tight mb-4">Keyword Frequency Trend</h2>

                                <div class="absolute top-4 right-4 z-10 flex gap-2">

                                </div>

                    <!-- RIGHT COL: DOCKET & LEGISLATORS -->
                    <div class="space-y-8">
                        
                        <!-- Upcoming Docket -->

                            <h3 class="font-black uppercase tracking-wider mb-4 border-b-2 border-stone-950 pb-2">Upcoming Docket</h3>

                                            ${leg.attendance}%
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>

                    </div>
                </div>
            `;
        }

        function renderProfile() {
            // Simulated Attendance Data for Heatmap
            let heatmapHTML = '<div class="flex flex-wrap gap-1 max-w-xs">';
            for(let i=0; i<50; i++) {
                const isAbsent = Math.random() > 0.85;
                const color = isAbsent ? 'bg-rose-500' : 'bg-stone-300';
                const title = isAbsent ? 'Absent' : 'Present';
                heatmapHTML += `<div class="w-3 h-3 ${color} border border-stone-950" title="${title}"></div>`;
            }
            heatmapHTML += '</div>';

            return `
                <div class="flex items-center gap-2 mb-6 text-sm font-bold uppercase text-stone-500 hover:text-stone-900 cursor-pointer" onclick="navigateTo('dashboard')">

                        <div class="flex-grow">

                                <span class="bg-stone-100 px-2 py-1 border border-stone-950">Progressive Party</span>

                            </div>
                            
                            <!-- ATTENDANCE HAWK (Elena's Tool) -->

                        <!-- DONOR CARD -->

                                <div class="flex justify-between">
                                    <span>Real Estate</span>
                                    <span class="font-bold">$12k</span>
                                </div>
                                <div class="w-full bg-stone-200 h-2 border border-stone-950"><div class="bg-rose-900 h-full w-[80%]"></div></div>
                                <div class="flex justify-between mt-2">
                                    <span>Fire Union</span>
                                    <span class="font-bold">$8.5k</span>
                                </div>
                                <div class="w-full bg-stone-200 h-2 border border-stone-950"><div class="bg-stone-600 h-full w-[60%]"></div></div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- SAY VS DO (Mary's Tool) -->
                <section class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8">
                    
                    <!-- SAY -->
                    <div class="bg-white brutal-border p-6">
                        <h3 class="font-black uppercase tracking-tight text-xl mb-4 flex items-center gap-2">
                            <span class="bg-stone-950 text-white px-2 text-sm">SAY</span>
                            Rhetoric Analysis
                        </h3>
                        <div class="space-y-4">
                            <div class="p-4 bg-stone-50 border-2 border-stone-200">
                                <div class="font-serif italic text-lg mb-2">"We absolutely must prioritize green spaces over new parking lots."</div>
                                <div class="font-mono text-xs text-stone-500 uppercase">
                                    Source: Oct 12 Meeting | Sentiment: <span class="text-emerald-700 font-bold">POSITIVE (+0.9)</span>
                                </div>
                            </div>
                            <div class="p-4 bg-stone-50 border-2 border-stone-200">
                                <div class="font-serif italic text-lg mb-2">"I am committed to affordable housing, even if it upsets developers."</div>
                                <div class="font-mono text-xs text-stone-500 uppercase">
                                    Source: Sept 04 Meeting | Sentiment: <span class="text-emerald-700 font-bold">STRONG</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- DO -->
                    <div class="bg-white brutal-border p-6">
                        <h3 class="font-black uppercase tracking-tight text-xl mb-4 flex items-center gap-2">
                            <span class="bg-rose-700 text-white px-2 text-sm">DO</span>
                            Voting Record
                        </h3>
                        <table class="w-full text-left border-collapse">
                            <thead>

                                </tr>
                            </thead>
                            <tbody class="font-bold text-sm">

        function renderMeeting() {
            return `

                            </div>
                            
                            <div class="hover:bg-yellow-100 cursor-pointer p-1 transition-colors">
                                <span class="text-stone-400 mr-2">[00:15:12]</span>
                                <span class="font-bold text-rose-900">Rodriguez:</span> 
                                I move to open the floor for public comment on the variance.
                            </div>

        function renderSearch() {
            return `
                <div class="flex items-center gap-2 mb-6 text-sm font-bold uppercase text-stone-500 hover:text-stone-900 cursor-pointer" onclick="navigateTo('dashboard')">
                    <- Back to Dashboard
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <!-- FILTERS SIDEBAR -->
                    <div class="bg-white brutal-border p-4 h-fit">
                        <h3 class="font-black uppercase tracking-wide mb-4 border-b-2 border-stone-950 pb-2">Filters</h3>

        // --- APP LOGIC ---

        function navigateTo(viewName) {
            state.view = viewName;
            updateView();
        }

        function updateView() {
            const container = document.getElementById('app-container');
            container.innerHTML = ''; // Clear current view
            
            // Scroll to top
            window.scrollTo(0,0);

            if (state.view === 'dashboard') {
                container.innerHTML = renderDashboard();
                initCharts();
            } else if (state.view === 'profile') {
                container.innerHTML = renderProfile();
            } else if (state.view === 'meeting') {
                container.innerHTML = renderMeeting();
            } else if (state.view === 'search') {
                container.innerHTML = renderSearch();
            }
        }

        function initCharts() {
            const ctx = document.getElementById('trendChart');
            if (ctx) {
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                        datasets: [
                            {
                                label: 'Housing',
                                data: [12, 19, 3, 5, 2, 3, 15],
                                borderColor: '#881337', // Rose-900
                                backgroundColor: '#881337',
                                borderWidth: 3,
                                tension: 0, // Sharp lines for brutalist look
                                pointRadius: 0,
                                pointHoverRadius: 6
                            },
                            {
                                label: 'Police',
                                data: [5, 2, 12, 15, 10, 8, 5],
                                borderColor: '#0c0a09', // Stone-950
                                backgroundColor: '#0c0a09',
                                borderWidth: 3,
                                tension: 0,
                                pointRadius: 0,
                                pointHoverRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    font: { family: 'JetBrains Mono', weight: 'bold' },
                                    boxWidth: 10,
                                    usePointStyle: true,
                                    pointStyle: 'rect'
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { font: { family: 'JetBrains Mono' } }
                            },
                            y: {
                                grid: { color: '#e7e5e4' }, // Stone-200
                                border: { display: false },
                                ticks: { font: { family: 'JetBrains Mono' } }
                            }
                        }
                    }
                });
            }
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            updateView(); // Load initial view
        });

    </script>
